"""Filter options for querying active app deployments. The date filters (lastUsedBefore, neverUsedAndCreatedBefore) use OR semantics: a deployment is included if it matches either date condition. If no date filters are provided, all active deployments are returned."""
input ActiveAppDeploymentsFilter {
  """Returns deployments that were last used before the given timestamp. Useful for identifying stale or inactive deployments that have been used at least once but not recently."""
  lastUsedBefore: DateTime
  """Filter by app deployment name. Case-insensitive partial match. Applied with AND semantics to narrow down results."""
  name: String
  """Returns deployments that have never been used and were created before the given timestamp. Useful for identifying old, unused deployments that may be candidates for cleanup."""
  neverUsedAndCreatedBefore: DateTime
}

