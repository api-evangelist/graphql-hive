apis:
  - aid: graphql-hive:graphql-hive-graphql-api
    name: GraphQL Hive Console GraphQL API
    description: >-
      The public GraphQL API for Hive Console allows developers to build custom
      workflows, administer users and access tokens, retrieve usage metrics,
      manage schema registries, publish schemas, validate compatibility, and
      track breaking changes programmatically without the CLI. Authentication
      uses Bearer tokens with the hvo1/ prefix format.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
