aid: graphql-hive
name: GraphQL Hive
description: >-
  GraphQL Hive is an open-source GraphQL schema registry and observability
  platform developed by The Guild. It provides a REST and GraphQL API for
  schema publishing, validation, usage tracking, breaking change detection,
  and analytics for GraphQL federation and other GraphQL APIs. Available as
  a managed cloud service or self-hosted deployment.
